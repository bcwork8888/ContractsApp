<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Your Contract - FieldSync</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --border-blue: #cbd5e1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border: 1px solid #e2e8f0;
        }
        .logo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 15px;
        }
        .logo-img {
            max-height: 40px;
            max-width: 120px;
            object-fit: contain;
        }
        .site-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-blue);
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .label {
            color: #64748b;
            font-weight: 500;
        }
        .value {
            font-weight: 600;
            color: #0f172a;
        }
        canvas {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            cursor: crosshair;
            width: 100%;
            height: 150px;
        }
        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #172554;
        }
        .btn-clear {
            background: #f1f5f9;
            color: #475569;
            margin-top: 8px;
        }
        .btn-clear:hover {
            background: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="card" id="sign-card">
        <div class="logo-header">
            <img id="comp-logo" class="logo-img" src="./logo.JPG">
            <span id="comp-name" class="site-title">FieldSync Draft</span>
        </div>
        
        <h2>Sign Contract</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Please review the contract details and sign in the pad below.</p>
        
        <div class="details-grid">
            <div>
                <div class="label">Customer Name</div>
                <div id="cust-val" class="value">-</div>
            </div>
            <div>
                <div class="label">Seller Name</div>
                <div id="seller-val" class="value">-</div>
            </div>
            <div>
                <div class="label">Project / Address</div>
                <div id="project-val" class="value">-</div>
            </div>
            <div>
                <div class="label">Total Price</div>
                <div id="price-val" class="value">-</div>
            </div>
        </div>
        
        <label style="font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px;">Signature Pad:</label>
        <canvas id="sig-canvas"></canvas>
        <button class="btn btn-clear" onclick="clearSig()">Clear Pad</button>
        
        <button class="btn" onclick="submitSig()">Sign Contract</button>
    </div>

    <div class="card" id="success-card" style="display: none; text-align: center;">
        <h2 style="color: #16a34a;">Thank You!</h2>
        <p>Your signature has been successfully submitted and saved onto the contract.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        let canvas, ctx, isDrawing = false;
        
        async function loadContract() {
            if (!token) {
                alert("Invalid or missing token link.");
                return;
            }
            const res = await fetch(`/api/contract-by-token?token=${token}`);
            if (!res.ok) {
                alert("Contract not found or already signed.");
                return;
            }
            const { contract } = await res.json();
            
            document.getElementById('cust-val').innerText = contract.customer;
            document.getElementById('seller-val').innerText = contract.seller;
            document.getElementById('project-val').innerText = contract.projectName;
            document.getElementById('price-val').innerText = `$${Number(contract.price).toLocaleString()}`;
            
            if (contract.companyLogo) document.getElementById('comp-logo').src = contract.companyLogo;
            if (contract.companyOfficialName) document.getElementById('comp-name').innerText = contract.companyOfficialName;
            
            initCanvas();
        }
        
        function initCanvas() {
            canvas = document.getElementById('sig-canvas');
            ctx = canvas.getContext('2d');
            
            // Adjust canvas resolution for screen width
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            
            // Mouse Events
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('mouseleave', stopDraw);
            
            // Touch Events (Mobile support)
            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
                e.preventDefault();
            });
            canvas.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                canvas.dispatchEvent(mouseEvent);
                e.preventDefault();
            });
            canvas.addEventListener('touchend', (e) => {
                const mouseEvent = new MouseEvent('mouseup', {});
                canvas.dispatchEvent(mouseEvent);
                e.preventDefault();
            });
        }
        
        function startDraw(e) {
            isDrawing = true;
            ctx.beginPath();
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }
        
        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        }
        
        function stopDraw() {
            isDrawing = false;
        }
        
        function clearSig() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        async function submitSig() {
            const signature = canvas.toDataURL('image/png');
            
            const res = await fetch('/api/submit-signature', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, signature })
            });
            
            if (res.ok) {
                document.getElementById('sign-card').style.display = 'none';
                document.getElementById('success-card').style.display = 'block';
            } else {
                alert("Failed to submit signature");
            }
        }
        
        window.onload = loadContract;
    </script>
</body>
</html>
